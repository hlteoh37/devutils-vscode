name: Release VSIX
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx tsc -p ./
      - run: npx @vscode/vsce package --no-dependencies
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          body: |
            ## DevUtils for VS Code — 44 Developer Utilities

            15 tools free — [unlock all 44 for $5](https://buymeacoffee.com/gl89tu25lp) (one-time).

            ### Install
            1. Download `devutils-vscode-0.1.0.vsix` below
            2. In VS Code: `Ctrl+Shift+P` → "Install from VSIX" → select the file
            3. Or: `code --install-extension devutils-vscode-0.1.0.vsix`

            [Get Pro License ($5)](https://buymeacoffee.com/gl89tu25lp) | [Source](https://github.com/hlteoh37/devutils-vscode)
